<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products</title>

    <style>
      body {
        font-family: Arial;
        padding: 20px;
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
      }

      #search {
        display: block;
        margin: 0 auto 30px;
        padding: 10px;
        width: 300px;
        font-size: 16px;
      }

      #container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
      }

      .card {
        background-color: #fff;
        border-radius: 8px;
        padding: 15px;
        border: 1px solid black;
        text-align: center;
      }

      .card img {
        width: 100%;
        height: 180px;
        object-fit: contain;
      }

      .title {
        font-size: 14px;
        font-weight: bold;
        margin: 10px 0;
      }

      .price {
        font-size: 18px;
        font-weight: bold;
      }

      .description{
        text-align: justify;
      }
    </style>
  </head>

  <body>
    <h1>Product List</h1>
    <div id="container"></div>
  </body>

  <script>
    const container = document.getElementById("container");
    fetch("https://fakestoreapi.com/products")
      .then((res) => res.json())
      .then((data) => {
        console.log(data);
        data.forEach((product) => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <img src="${product.image}" />
        <div class="title">${product.title}</div>
        <div class="category">${product.category}</div>
        <div class="price">${product.price}</div>
        <div class="description">${product.description}</div>
            `;
          container.appendChild(card);
        });
      })
      .catch((error) => console.log(error));
  </script>
</html>
